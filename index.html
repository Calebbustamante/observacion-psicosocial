<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Observacion Aula Psicosocial</title>

<style>
:root{
  --bg:#f1f5f9;--card:#fff;--card-shadow:0 1px 4px rgba(0,0,0,.08);
  --nav:#1e3a5f;--txt:#1e293b;--txt-soft:#64748b;--txt-xsoft:#94a3b8;
  --border:#e2e8f0;--input-bg:#fff;--input-txt:#1e293b;
  --row-alt:#fafbfc;--sec-bg:#f8fafc;--stat-bg:#f8fafc;
  --ind-card-bg:#f8fafc;--obs-card-bg:#fff;
  --dash-hover:#f8fafc;--rank-bg:#e2e8f0;--progress-bg:#e2e8f0;
  --modal-bg:#fff;--modal-overlay:rgba(0,0,0,.4);
  --btn-cancel-bg:#f1f5f9;--btn-cancel-txt:#475569;
  --tutor-card-bg:#f8fafc;--lbl:#64748b;
}
body.dark{
  --bg:#0f172a;--card:#1e293b;--card-shadow:0 1px 6px rgba(0,0,0,.5);
  --nav:#0c1425;--txt:#e2e8f0;--txt-soft:#94a3b8;--txt-xsoft:#64748b;
  --border:#334155;--input-bg:#0f172a;--input-txt:#e2e8f0;
  --row-alt:#162032;--sec-bg:#162032;--stat-bg:#162032;
  --ind-card-bg:#162032;--obs-card-bg:#1e293b;
  --dash-hover:#162032;--rank-bg:#334155;--progress-bg:#334155;
  --modal-bg:#1e293b;--modal-overlay:rgba(0,0,0,.7);
  --btn-cancel-bg:#334155;--btn-cancel-txt:#cbd5e1;
  --tutor-card-bg:#162032;--lbl:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:70px;transition:background .25s,color .25s}

/* ── NAV DESKTOP ─────────────────────────────────────────── */
nav{background:var(--nav);color:#fff;padding:0 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:56px;transition:background .25s}
.nav-title{font-weight:700;font-size:15px;margin-right:16px;white-space:nowrap}
.nav-btn{background:transparent;border:none;color:rgba(255,255,255,.75);padding:10px 14px;cursor:pointer;font-size:13px;border-radius:6px;white-space:nowrap;display:flex;align-items:center;gap:5px}
.nav-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.nav-btn.active{background:rgba(255,255,255,.2);color:#fff;font-weight:600}
.nav-icon{font-size:16px}
.btn-theme{margin-left:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:background .2s}
.btn-theme:hover{background:rgba(255,255,255,.22)}

/* ── LAYOUT ──────────────────────────────────────────────── */
.container{max-width:820px;margin:28px auto;padding:0 16px}
.card{background:var(--card);border-radius:14px;padding:24px;box-shadow:var(--card-shadow);transition:background .25s}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.stitle{font-size:18px;font-weight:700;color:var(--txt)}

/* ── FORMS ───────────────────────────────────────────────── */
label.lbl{display:block;font-size:12px;font-weight:600;color:var(--lbl);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
select,input[type=text],input[type=date]{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;color:var(--input-txt);background:var(--input-bg);outline:none;-webkit-appearance:none;appearance:none;transition:background .25s,color .25s,border-color .2s}
select:focus,input:focus{border-color:#3b82f6}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.tutor-grid{display:grid;grid-template-columns:2fr 1fr 1.2fr auto;gap:8px;align-items:center;margin-bottom:8px}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;color:var(--input-txt);background:var(--input-bg);outline:none;transition:background .25s,color .25s,border-color .2s}
.inp:focus{border-color:#3b82f6}
textarea.inp{resize:vertical}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn-primary{background:#1e3a5f;color:#fff;border:none;padding:11px 18px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;min-height:44px}
.btn-primary:hover{background:#2d5282}
.btn-danger{background:#fee2e2;color:#dc2626;border:1px solid #fecaca;padding:9px 12px;border-radius:7px;font-size:13px;cursor:pointer;font-weight:600;min-height:40px}
.btn-danger:hover{background:#fecaca}
.btn-cancel{background:var(--btn-cancel-bg);color:var(--btn-cancel-txt);border:none;padding:11px 18px;border-radius:8px;font-size:14px;cursor:pointer;min-height:44px;transition:background .25s,color .25s}
.btn-full{width:100%}

/* ── BADGES & ALERTS ──────────────────────────────────────── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px}
.alert-ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.alert-err{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty{text-align:center;padding:48px 20px;color:var(--txt-xsoft)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-title{font-size:16px;font-weight:600;color:var(--txt-soft);margin-bottom:6px}
.empty-sub{font-size:13px}

/* ── INDICADORES ─────────────────────────────────────────── */
.opt-group{display:flex;gap:6px;flex-wrap:wrap}
.opt-btn{padding:9px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--txt);cursor:pointer;font-size:14px;transition:all .15s;min-height:42px;font-weight:500}
.opt-btn.sel-Si{background:#dcfce7;border-color:#86efac;color:#166534;font-weight:700}
.opt-btn.sel-Aveces{background:#fef3c7;border-color:#fde68a;color:#92400e;font-weight:700}
.opt-btn.sel-No{background:#fee2e2;border-color:#fecaca;color:#991b1b;font-weight:700}

/* Indicadores tabla desktop */
.ind-sec-hdr{background:#1e3a5f;color:#fff;padding:9px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:grid;grid-template-columns:1fr 90px 100px 80px}
.ind-sec-hdr-m{display:none}
.ind-item-row{display:grid;grid-template-columns:1fr 90px 100px 80px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--card);transition:background .25s}
.ind-item-row:nth-child(even){background:var(--row-alt)}
.ind-item-row .ind-opts{display:contents}
.ind-item-row .ind-opt-cell{text-align:center}
.ind-item-card{display:none}

/* ── OBS CARDS ───────────────────────────────────────────── */
.obs-card{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;background:var(--obs-card-bg);transition:background .25s}
.obs-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;margin:2px}
.obs-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.obs-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.obs-btn-edit{font-size:12px;padding:7px 14px;background:#e0e7ff;color:#3730a3;min-height:36px}
.obs-btn-del{font-size:12px;padding:7px 12px;min-height:36px}

/* ── STAT CARDS ──────────────────────────────────────────── */
.stat-card{background:var(--stat-bg);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--border);transition:background .25s}
.stat-val{font-size:28px;font-weight:800}
.stat-lbl{font-size:12px;color:var(--txt-soft);margin-top:4px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}

/* ── DASH ROW ────────────────────────────────────────────── */
.dash-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--card);transition:background .25s}
.dash-row:hover{background:var(--dash-hover)}
.rank{width:26px;height:26px;border-radius:50%;background:var(--rank-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:var(--txt)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0}
.progress-bar{height:6px;border-radius:3px;background:var(--progress-bg);flex:1;min-width:60px}
.progress-fill{height:6px;border-radius:3px}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:var(--modal-overlay);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-box{background:var(--modal-bg);border-radius:14px;padding:28px;max-width:440px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.25);transition:background .25s}
.modal-title{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--txt)}
.modal-body{font-size:14px;color:var(--txt-soft);margin-bottom:20px;line-height:1.6}
.modal-footer{display:flex;gap:10px;justify-content:flex-end}

/* ══════════════════════════════════════════════════════════
   MOBILE — max-width: 640px
══════════════════════════════════════════════════════════ */
@media(max-width:640px){

  body{padding-bottom:80px}

  /* ── BOTTOM TAB BAR ─────────────────────────────────── */
  nav{
    position:fixed;bottom:0;left:0;right:0;top:auto;
    padding:0;min-height:62px;z-index:100;
    justify-content:space-around;
    border-top:1px solid rgba(255,255,255,.15);
    box-shadow:0 -2px 12px rgba(0,0,0,.2);
  }
  .nav-title{display:none}
  .btn-theme{display:none!important}
  /* Botón tema flotante (móvil) */
  .btn-theme-float{
    position:fixed;top:14px;right:14px;z-index:300;
    background:var(--nav);border:1px solid rgba(255,255,255,.2);
    color:#fff;padding:8px 14px;border-radius:20px;
    cursor:pointer;font-size:13px;font-weight:600;
    display:flex;align-items:center;gap:5px;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .nav-btn{
    flex:1;padding:8px 4px 6px;font-size:10px;border-radius:0;
    flex-direction:column;gap:2px;color:rgba(255,255,255,.6);
    min-height:62px;justify-content:center;
  }
  .nav-btn.active{color:#fff;background:rgba(255,255,255,.15)}
  .nav-icon{font-size:20px}

  /* ── LAYOUT ──────────────────────────────────────────── */
  .container{margin:12px auto 16px;padding:0 10px}
  .card{border-radius:12px;padding:16px}
  .card-header{gap:8px}
  .stitle{font-size:16px}

  /* ── FORMS ───────────────────────────────────────────── */
  .form-grid2{grid-template-columns:1fr!important}
  select,input[type=text],input[type=date]{font-size:16px!important;padding:13px 12px}
  .inp{font-size:16px!important;padding:13px 12px}
  textarea.inp{font-size:16px!important}
  label.lbl{font-size:11px}

  /* ── BUTTONS ─────────────────────────────────────────── */
  .btn-primary{font-size:15px;padding:13px 16px;min-height:48px}
  .btn-danger{font-size:13px;padding:10px 12px;min-height:44px}
  .btn-cancel{font-size:15px;padding:13px 16px;min-height:48px}

  /* ── TUTOR GRID ──────────────────────────────────────── */
  .tutor-grid{grid-template-columns:1fr!important;gap:6px;
    background:var(--tutor-card-bg);border-radius:10px;padding:12px;border:1px solid var(--border)}
  .tutor-grid .btn-danger{width:100%;text-align:center}
  .tutor-hdr-desktop{display:none!important}

  /* ── INDICADORES — cambio a tarjetas ────────────────── */
  .ind-sec-hdr{display:none!important}
  .ind-sec-hdr-m{display:block;background:#1e3a5f;color:#fff;padding:9px 12px;
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .ind-item-row{display:none!important}
  .ind-item-card{display:block;padding:12px;border-bottom:1px solid var(--border)}
  .ind-item-card:last-child{border-bottom:none}
  .ind-card-name{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:8px;line-height:1.4}
  .ind-card-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .opt-btn{padding:10px 8px;font-size:13px;border-radius:8px;min-height:44px;text-align:center}

  /* ── STATS ───────────────────────────────────────────── */
  .stats-grid{grid-template-columns:repeat(2,1fr)!important}
  .stat-val{font-size:24px}

  /* ── DASH ROW ────────────────────────────────────────── */
  .progress-bar{display:none}
  .dash-row{padding:10px 12px;gap:10px}

  /* ── OBS CARDS ───────────────────────────────────────── */
  .obs-card{padding:12px}
  .obs-meta{gap:6px;margin-bottom:8px}
  .obs-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .obs-btn-edit{font-size:13px;padding:10px;min-height:44px;text-align:center}
  .obs-btn-del{font-size:13px;padding:10px;min-height:44px;text-align:center}
  /* Section summary - 1 column on very small screens */
  .sec-summary-grid{grid-template-columns:1fr!important}

  /* ── MODAL ───────────────────────────────────────────── */
  .modal-box{padding:20px;border-radius:12px}
  .modal-footer{flex-direction:column}
  .modal-footer button{width:100%}
}
</style>
</head>

var fichas = {};

// ── STORAGE ──────────────────────────────────────────────────────────────────
function cargarEstudiantes() {
  try { var r=localStorage.getItem("psicosocial_est"); return r?JSON.parse(r):JSON.parse(JSON.stringify(DATOS_BASE)); }
  catch(e){ return JSON.parse(JSON.stringify(DATOS_BASE)); }
}
function guardarEstudiantes(){ localStorage.setItem("psicosocial_est",JSON.stringify(estudiantes)); }
function cargarObs(){ try{ return JSON.parse(localStorage.getItem("psicosocial")||"[]"); }catch(e){ return []; } }
function guardarObs(){ localStorage.setItem("psicosocial",JSON.stringify(state.obs)); }
function cargarItems(){ try{ var r=localStorage.getItem("psicosocial_items"); return r?JSON.parse(r):JSON.parse(JSON.stringify(ITEMS_BASE)); }catch(e){ return JSON.parse(JSON.stringify(ITEMS_BASE)); } }
function guardarItems(){ localStorage.setItem("psicosocial_items",JSON.stringify(items)); }
function cargarFichas(){ try{ return JSON.parse(localStorage.getItem("psicosocial_fichas")||"{}"); }catch(e){ return {}; } }
function guardarFichas(){ localStorage.setItem("psicosocial_fichas",JSON.stringify(fichas)); }

function cursos(){ return Object.keys(estudiantes).sort(); }
function cursoDeEst(n){ var e=Object.entries(estudiantes).find(function(x){ return x[1].indexOf(n)>=0; }); return e?e[0]:""; }
function fichaDeEst(n){ return fichas[n]||{contacto:"",direccion:"",tutores:[],diagPsico:"",diagMedico:""}; }
function hoy(){ return new Date().toISOString().split("T")[0]; }
function pts(tipo,r){ return (PUNTAJES[tipo]||{})[r]||0; }
function pctEstado(p){
  if(p>=70) return {label:"Adecuado",dot:"#16a34a",bg:"#dcfce7",txt:"#14532d",brd:"#bbf7d0"};
  if(p>=40) return {label:"En observacion",dot:"#d97706",bg:"#fef3c7",txt:"#78350f",brd:"#fde68a"};
  return {label:"Riesgo",dot:"#dc2626",bg:"#fee2e2",txt:"#7f1d1d",brd:"#fecaca"};
}
function iniciales(n){ return n.split(" ").slice(0,2).map(function(w){ return w[0]||""; }).join("").toUpperCase(); }
function aColor(n){
  var c=["#3b82f6","#8b5cf6","#06b6d4","#10b981","#f59e0b","#ef4444","#ec4899"];
  var h=0; for(var i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))&0x7fffffff;
  return c[h%c.length];
}
function fmtFecha(f){ return new Date(f+"T12:00:00").toLocaleDateString("es-CL",{weekday:"long",year:"numeric",month:"long",day:"numeric"}); }
function htmlAvatar(n,sz){
  sz=sz||40;
  return '<div class="avatar" style="width:'+sz+'px;height:'+sz+'px;font-size:'+(sz*0.36|0)+'px;background:'+aColor(n)+'">'+iniciales(n)+'</div>';
}
function htmlBadge(e){ return '<span class="badge" style="background:'+e.bg+';color:'+e.txt+';border:1px solid '+e.brd+'">'+e.label+'</span>'; }

function resumenEst(nombre){
  var obs=state.obs.filter(function(o){ return o.estudiante===nombre; });
  if(!obs.length) return null;
  var sum=obs.reduce(function(a,o){ return a+o.pct; },0);
  return { nObs:obs.length, avg:Math.round(sum/obs.length) };
}

// ── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function render(){
  var html="";
  if(state.tab==="registro") html=renderRegistro();
  else if(state.tab==="reportes") html=renderReportes();
  else if(state.tab==="dashboard") html=renderDashboard();
  else if(state.tab==="estudiantes") html=renderEstudiantes();
  else if(state.tab==="fichas") html=renderFichas();
  document.getElementById("content").innerHTML=html;
  attachEvents();
}

// ── TAB REGISTRO ─────────────────────────────────────────────────────────────

    itemsHtml+='<div class="ind-opt-cell"><button class="opt-btn'+s2+'" data-item="'+it.nombre+'" data-op="A veces" style="white-space:nowrap">A veces</button></div>';
    itemsHtml+='<div class="ind-opt-cell"><button class="opt-btn'+s3+'" data-item="'+it.nombre+'" data-op="No">No</button></div>';

    itemsHtml+=it.nombre;

    itemsHtml+='<div class="ind-card-btns">';

    itemsHtml+='<button class="opt-btn'+s2+'" data-item="'+it.nombre+'" data-op="A veces">A veces</button>';
    itemsHtml+='<button class="opt-btn'+s3+'" data-item="'+it.nombre+'" data-op="No">No</button>';

  itemsHtml+='</div>';

  itemsHtml+='<label class="lbl">Observaciones</label>';

    +'<div style="margin-bottom:12px"><label class="lbl">Nombre del estudiante</label><select id="sel-est" '+(r.curso?'':'disabled')+'>'+estOpts+'</select></div>'

    +'<label class="lbl">Asistencia</label>'
    +'<div style="display:flex;gap:20px;margin-top:4px">'
    +'<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;font-weight:600;color:'+(r.asistencia==="Presente"?"#166534":"#374151")+'">'
    +'<input type="radio" name="asistencia" id="ast-presente" value="Presente" '+(r.asistencia==="Presente"?"checked":"")+'> Presente</label>'

// ── TAB REPORTES ─────────────────────────────────────────────────────────────
function renderReportes(){
  var r=state.rep;
  var cursosOpts='<option value="">Todos los cursos</option>';
  cursos().forEach(function(c){ cursosOpts+='<option'+(c===r.curso?' selected':'')+'>'+c+'</option>'; });
  var estOpts='<option value="">Todos los estudiantes</option>';
  if(r.curso){ (estudiantes[r.curso]||[]).forEach(function(e){ estOpts+='<option'+(e===r.estudiante?' selected':'')+'>'+e+'</option>'; }); }

  var obsFiltradas=state.obs.filter(function(o){
    if(r.curso && cursoDeEst(o.estudiante)!==r.curso) return false;
    if(r.estudiante && o.estudiante!==r.estudiante) return false;
    return true;
  }).sort(function(a,b){ return b.fecha.localeCompare(a.fecha); });

  var listaHtml="";
  if(!obsFiltradas.length){
    listaHtml='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Sin observaciones</div><div class="empty-sub">No hay registros para este filtro.</div></div>';
  } else {
    obsFiltradas.forEach(function(o){
      var est=pctEstado(o.pct);
      var curso=cursoDeEst(o.estudiante);
      if(r.editId===o.id){
        var inputsHtml="";
        items.forEach(function(it){
          var v=r.editResp[it.nombre]||"";
          var s1=(v==="Si")?" sel-Si":""; var s2=(v==="A veces")?" sel-Aveces":""; var s3=(v==="No")?" sel-No":"";
          inputsHtml+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">';
          inputsHtml+='<span style="font-size:12px;font-weight:600;min-width:120px">'+it.nombre+'</span>';
          inputsHtml+='<button class="opt-btn edit-opt'+s1+'" data-item="'+it.nombre+'" data-op="Si">Si</button>';
          inputsHtml+='<button class="opt-btn edit-opt'+s2+'" data-item="'+it.nombre+'" data-op="A veces">A veces</button>';
          inputsHtml+='<button class="opt-btn edit-opt'+s3+'" data-item="'+it.nombre+'" data-op="No">No</button>';
          inputsHtml+='</div>';
        });
        listaHtml+='<div class="obs-card" style="border-color:#3b82f6">';
        listaHtml+='<div style="margin-bottom:12px"><label class="lbl">Fecha</label><input type="date" id="edit-fecha" value="'+r.editFecha+'" style="max-width:180px"></div>';
        listaHtml+=inputsHtml;
        listaHtml+='<div id="alert-edit"></div>';
        listaHtml+='<div style="display:flex;gap:8px;margin-top:10px">';
        listaHtml+='<button id="btn-save-edit" class="btn-primary" data-id="'+o.id+'">Guardar</button>';
        listaHtml+='<button id="btn-cancel-edit" class="btn-cancel" style="border:none">Cancelar</button>';
        listaHtml+='</div></div>';
      } else {
        // ── Compact summary by section ──
        var secciones={};
        items.forEach(function(it){
          var sec=it.seccion||"General";
          if(!secciones[sec]) secciones[sec]=[];
          secciones[sec].push(it);
        });
        var seccionHtml="";
        Object.keys(secciones).forEach(function(sec){
          var nSi=0, nAv=0, nNo=0, nAlerta=0;
          secciones[sec].forEach(function(it){
            var v=o.resp[it.nombre]||"";
            if(v==="Si") nSi++;
            else if(v==="A veces") nAv++;
            else if(v==="No") nNo++;
            // count concerning responses
            if((it.tipo==="Alerta"&&v==="Si")||(it.tipo==="Positivo"&&v==="No")) nAlerta++;
          });
          var secColor=nAlerta>0?"#fef3c7":"#f0fdf4";
          var secBorder=nAlerta>0?"#fde68a":"#bbf7d0";
          seccionHtml+='<div style="background:'+secColor+';border:1px solid '+secBorder+';border-radius:7px;padding:7px 10px;display:flex;align-items:center;gap:8px">';
          seccionHtml+='<span style="font-size:11px;font-weight:700;color:#1e3a5f;flex:1">'+sec+'</span>';
          if(nSi) seccionHtml+='<span style="font-size:11px;padding:2px 6px;border-radius:12px;background:#fee2e2;color:#991b1b;font-weight:600">Si: '+nSi+'</span>';
          if(nAv) seccionHtml+='<span style="font-size:11px;padding:2px 6px;border-radius:12px;background:#fef3c7;color:#92400e;font-weight:600">A veces: '+nAv+'</span>';
          if(nNo) seccionHtml+='<span style="font-size:11px;padding:2px 6px;border-radius:12px;background:#f1f5f9;color:#475569;font-weight:600">No: '+nNo+'</span>';
          seccionHtml+='</div>';
        });

        // ── Full chips for expanded view ──
        var chips="";
        items.forEach(function(it){
          var v=o.resp[it.nombre]||"-";
          var bg=v==="Si"?(it.tipo==="Positivo"?"#dcfce7":"#fee2e2"):v==="A veces"?"#fef3c7":"#f1f5f9";
          var tc=v==="Si"?(it.tipo==="Positivo"?"#166534":"#991b1b"):v==="A veces"?"#92400e":"#64748b";
          chips+='<span class="chip" style="background:'+bg+';color:'+tc+'">'+it.nombre+': '+v+'</span>';
        });

        var detId="det-"+o.id;
        listaHtml+='<div class="obs-card">';
        // ── Info header (avatar + nombre + fecha) ──
        listaHtml+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+htmlAvatar(o.estudiante,36)+'<div style="min-width:0">';
        listaHtml+='<div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+o.estudiante+'</div>';
        listaHtml+='<div style="font-size:12px;color:#64748b;line-height:1.4">'+curso+' &middot; '+fmtFecha(o.fecha)+(o.asignatura?' &middot; '+o.asignatura:'')+'</div>';
        listaHtml+='</div></div>';
        // ── Badges row ──
        listaHtml+='<div class="obs-meta">';
        if(o.asistencia==="Ausente") listaHtml+='<span style="font-size:12px;padding:3px 10px;border-radius:20px;background:#fee2e2;color:#991b1b;font-weight:600">Ausente</span>';
        else listaHtml+='<span style="font-size:12px;padding:3px 10px;border-radius:20px;background:#dcfce7;color:#166534;font-weight:600">Presente</span>';
        if(o.observador) listaHtml+='<span style="font-size:12px;color:#64748b;padding:3px 6px">'+o.observador+'</span>';
        listaHtml+='<span style="font-weight:700;font-size:15px;color:'+est.dot+'">'+o.pct+'%</span>';
        listaHtml+=htmlBadge(est);
        listaHtml+='</div>';
        // ── Action buttons ──
        listaHtml+='<div class="obs-btns">';
        listaHtml+='<button class="btn-primary obs-btn-edit" data-action="editar" data-id="'+o.id+'">&#9998; Editar</button>';
        listaHtml+='<button class="btn-danger obs-btn-del" data-action="eliminar" data-id="'+o.id+'">&#128465; Eliminar</button>';
        listaHtml+='</div>';
        // compact section summary
        listaHtml+='<div class="sec-summary-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px">'+seccionHtml+'</div>';
        // toggle detail
        listaHtml+='<div><button data-action="toggle-det" data-target="'+detId+'" style="font-size:11px;color:#64748b;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline">▸ Ver indicadores completos</button></div>';
        listaHtml+='<div id="'+detId+'" style="display:none;margin-top:8px">'+chips+'</div>';
        if(o.observaciones) listaHtml+='<div style="margin-top:8px;padding:8px 10px;background:#f8fafc;border-radius:6px;font-size:12px;color:#475569;border-left:3px solid #94a3b8"><strong>Observaciones:</strong> '+o.observaciones+'</div>';
        listaHtml+='</div>';
      }
    });
  }

  return '<div class="container">'
    +'<div class="card">'
    +'<div class="card-header"><div><h2 class="stitle">📊 Reportes</h2><p style="font-size:13px;color:#64748b;margin-top:3px">'+state.obs.length+' observaciones en total</p></div></div>'
    +'<div class="form-grid2" style="margin-bottom:20px">'
    +'<div><label class="lbl">Curso</label><select id="rep-curso">'+cursosOpts+'</select></div>'
    +'<div><label class="lbl">Estudiante</label><select id="rep-est" '+(r.curso?'':'disabled')+'>'+estOpts+'</select></div>'
    +'</div>'
    +listaHtml
    +'</div></div>';
}

// ── TAB DASHBOARD ─────────────────────────────────────────────────────────────
function renderDashboard(){
  var filtro=state.dash.filtro;
  var todos=[];
  var cursosLista=filtro?[filtro]:cursos();
  cursosLista.forEach(function(c){
    (estudiantes[c]||[]).forEach(function(e){
      var res=resumenEst(e);
      if(res) todos.push({nombre:e,curso:c,avg:res.avg,nObs:res.nObs});
    });
  });
  todos.sort(function(a,b){ return b.avg-a.avg; });

  var nAdec=todos.filter(function(x){ return x.avg>=70; }).length;
  var nEnObs=todos.filter(function(x){ return x.avg>=40&&x.avg<70; }).length;
  var nRiesgo=todos.filter(function(x){ return x.avg<40; }).length;

  var statsHtml='<div class="stats-grid">'
    +'<div class="stat-card"><div class="stat-val" style="color:#1e3a5f">'+todos.length+'</div><div class="stat-lbl">Observados</div></div>'
    +'<div class="stat-card"><div class="stat-val" style="color:#16a34a">'+nAdec+'</div><div class="stat-lbl">Adecuado</div></div>'
    +'<div class="stat-card"><div class="stat-val" style="color:#d97706">'+nEnObs+'</div><div class="stat-lbl">En observacion</div></div>'
    +'<div class="stat-card"><div class="stat-val" style="color:#dc2626">'+nRiesgo+'</div><div class="stat-lbl">Riesgo</div></div>'
    +'</div>';

  var listaHtml="";
  if(!todos.length){
    listaHtml='<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Sin datos</div><div class="empty-sub">Registra observaciones para ver el dashboard.</div></div>';
  } else {
    todos.forEach(function(r,i){
      var e=pctEstado(r.avg);
      listaHtml+='<div class="dash-row">';
      listaHtml+='<div class="rank">'+(i+1)+'</div>';
      listaHtml+=htmlAvatar(r.nombre,34);
      listaHtml+='<div style="flex:1;min-width:0">';
      listaHtml+='<div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+r.nombre+'</div>';
      listaHtml+='<div style="font-size:11px;color:#64748b">'+r.curso+' &middot; '+r.nObs+' obs.</div>';
      listaHtml+='</div>';

// ── GUARDAR FICHA ─────────────────────────────────────────────────────────────
function saveFicha(){
  var est=state.fichas.estudiante;
  if(!est) return;
  if(!fichas[est]) fichas[est]={contacto:"",direccion:"",tutores:[],diagPsico:"",diagMedico:""};
  var c=document.getElementById("f-contacto"); if(c) fichas[est].contacto=c.value||"";
  var d=document.getElementById("f-direccion"); if(d) fichas[est].direccion=d.value||"";
  var p=document.getElementById("f-diag-psico"); if(p) fichas[est].diagPsico=p.value||"";
  var m=document.getElementById("f-diag-medico"); if(m) fichas[est].diagMedico=m.value||"";
  var noms=document.querySelectorAll(".tutor-nombre");
  var rels=document.querySelectorAll(".tutor-relacion");
  var tels=document.querySelectorAll(".tutor-telefono");
  fichas[est].tutores=[];
  for(var i=0;i<noms.length;i++){
    fichas[est].tutores.push({nombre:noms[i].value||"",relacion:rels[i]?rels[i].value||"":"",telefono:tels[i]?tels[i].value||"":""});
  }
  guardarFichas();
}

    +"<div style='margin-top:30px;padding-top:14px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8;text-align:center'>"
    +"Sistema de Observacion Aula Psicosocial &nbsp;&middot;&nbsp; "+new Date().toLocaleDateString("es-CL",{year:"numeric",month:"long",day:"numeric"})
    +"</div>"
    +"<sc"+"ript>window.onload=function(){window.print();};</sc"+"ript>"
    +"</body></html>";

  var w=window.open("","_blank","width=950,height=750");
  if(!w){ alert("Permite las ventanas emergentes para generar el PDF."); return; }
  w.document.write(html);
  w.document.close();
}

// ── EXPORTAR EXCEL ────────────────────────────────────────────────────────────
function exportarExcel(){
  if(typeof XLSX==="undefined"){ alert("Conectate a internet para usar la exportacion Excel."); return; }
  var wb=XLSX.utils.book_new();
  var hdr1=["Estudiante","Curso","N Observaciones","Promedio (%)","Estado"];
  var data1=[hdr1];
  var todosRes=[];
  cursos().forEach(function(c){
    (estudiantes[c]||[]).forEach(function(e){
      var res=resumenEst(e);
      if(res){
        var est=pctEstado(res.avg);
        data1.push([e,c,res.nObs,res.avg,est.label]);
        todosRes.push({nombre:e,curso:c,avg:res.avg});
      }
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data1),"Resumen General");

  var hdr2=["Fecha","Estudiante","Curso","Puntaje","Max","Porcentaje","Estado"];
  items.forEach(function(it){ hdr2.push(it.nombre); });
  var data2=[hdr2];
  state.obs.forEach(function(o){
    var row=[o.fecha,o.estudiante,cursoDeEst(o.estudiante),o.puntajeTotal,maxPts(),o.pct,pctEstado(o.pct).label];
    items.forEach(function(it){ row.push(o.resp[it.nombre]||""); });
    data2.push(row);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data2),"Detalle Observaciones");

  var fecha=new Date().toISOString().split("T")[0];
  XLSX.writeFile(wb,"Reporte_Psicosocial_"+fecha+".xlsx");
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function showModal(titulo,msg,onOk){
  document.getElementById("modal").innerHTML=
    '<div class="modal-overlay" id="modal-overlay">'
    +'<div class="modal-box">'
    +'<div class="modal-title">'+titulo+'</div>'
    +'<div class="modal-body">'+msg+'</div>'
    +'<div class="modal-footer">'
    +'<button class="btn-cancel" id="modal-cancel">Cancelar</button>'
    +'<button class="btn-primary" id="modal-ok" style="background:#dc2626">Confirmar</button>'
    +'</div></div></div>';
  document.getElementById("modal-cancel").onclick=function(){ document.getElementById("modal").innerHTML=""; };
  document.getElementById("modal-overlay").onclick=function(e){ if(e.target===this){ document.getElementById("modal").innerHTML=""; } };
  document.getElementById("modal-ok").onclick=function(){ document.getElementById("modal").innerHTML=""; onOk(); };
}

// ── ATTACH EVENTS ─────────────────────────────────────────────────────────────
function attachEvents(){
  // Tabs
  document.querySelectorAll(".nav-btn").forEach(function(btn){
    btn.onclick=function(){
      state.tab=btn.dataset.tab;
      document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.toggle("active",b===btn); });
      render();
    };
  });

  // REGISTRO
  if(state.tab==="registro"){
    var inpFecha=document.getElementById("inp-fecha");
    if(inpFecha) inpFecha.onchange=function(){ state.reg.fecha=this.value; };
    var selCurso=document.getElementById("sel-curso");
    if(selCurso) selCurso.onchange=function(){ state.reg.curso=this.value; state.reg.estudiante=""; state.reg.resp={}; state.reg.observaciones=""; render(); };
    var selEst=document.getElementById("sel-est");
    if(selEst) selEst.onchange=function(){ state.reg.estudiante=this.value; render(); };
    var inpObs=document.getElementById("inp-observaciones");
    if(inpObs) inpObs.oninput=function(){ state.reg.observaciones=this.value; };
    var inpAsig=document.getElementById("inp-asignatura");
    if(inpAsig) inpAsig.oninput=function(){ state.reg.asignatura=this.value; };
    var inpObservador=document.getElementById("inp-observador");
    if(inpObservador) inpObservador.oninput=function(){ state.reg.observador=this.value; };
    document.querySelectorAll("input[name='asistencia']").forEach(function(radio){
      radio.onchange=function(){ state.reg.asistencia=this.value; render(); };
    });

    document.querySelectorAll(".opt-btn").forEach(function(btn){
      btn.onclick=function(){ state.reg.resp[btn.dataset.item]=btn.dataset.op; render(); };
    });

    var btnPanelItems=document.getElementById("btn-panel-items");
    if(btnPanelItems) btnPanelItems.onclick=function(){
      // Group items by section
      var secciones={};
      items.forEach(function(it,i){
        var sec=it.seccion||"Sin seccion";
        if(!secciones[sec]) secciones[sec]=[];
        secciones[sec].push({it:it,i:i});
      });
      var html='<div class="modal-overlay" id="modal-overlay">'
        +'<div class="modal-box" style="max-width:780px;width:95vw;max-height:85vh;display:flex;flex-direction:column">'
        +'<div class="modal-title" style="flex-shrink:0">⚙ Gestionar Indicadores</div>'
        +'<div id="items-lista" style="overflow-y:auto;flex:1;margin-bottom:14px;padding-right:4px">';
      Object.keys(secciones).forEach(function(sec){
        html+='<div style="margin-bottom:12px">'
          +'<div style="background:#1e3a5f;color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">'+sec+'</div>'
          +'<div style="display:grid;grid-template-columns:1fr;gap:5px">';
        secciones[sec].forEach(function(obj){
          var it=obj.it; var i=obj.i;
          var tipoBg=it.tipo==="Positivo"?"#dcfce7":"#fee2e2";
          var tipoTxt=it.tipo==="Positivo"?"#166534":"#991b1b";
          html+='<div id="item-row-'+i+'" style="display:flex;align-items:center;gap:6px;padding:7px 8px;background:#f8fafc;border-radius:6px;border:1px solid #e2e8f0">'
            +'<span class="item-nombre-text" data-idx="'+i+'" style="flex:1;font-size:12px;color:#374151">'+it.nombre+'</span>'
            +'<input class="item-nombre-input" data-idx="'+i+'" style="display:none;flex:1;font-size:12px;padding:4px 7px;border:1.5px solid #3b82f6;border-radius:5px;color:#1e293b;background:#fff;outline:none" value="'+it.nombre+'">'
            +'<span style="font-size:10px;padding:2px 6px;border-radius:20px;white-space:nowrap;background:'+tipoBg+';color:'+tipoTxt+'">'+it.tipo+'</span>'
            +'<button class="btn-primary btn-edit-item" data-action="edit-item" data-idx="'+i+'" title="Editar nombre" style="font-size:11px;padding:4px 8px;background:#e0e7ff;color:#3730a3;min-height:28px">✏</button>'
            +'<button class="btn-primary btn-save-item" data-action="save-item" data-idx="'+i+'" style="display:none;font-size:11px;padding:4px 8px;background:#16a34a;min-height:28px">✓</button>'
            +'<button class="btn-danger btn-cancel-item" data-action="cancel-item" data-idx="'+i+'" style="display:none;font-size:11px;padding:4px 7px;min-height:28px">✕</button>'
            +'<button class="btn-danger btn-del-item" data-action="del-item" data-idx="'+i+'" style="font-size:10px;padding:3px 7px;flex-shrink:0;min-height:28px">🗑</button>'
            +'</div>';
        });
        html+='</div></div>';
      });
      html+='</div>'
        +'<div style="display:flex;gap:8px;margin-bottom:14px;flex-shrink:0">'
        +'<input type="text" id="new-item-nombre" placeholder="Nombre del indicador" style="flex:1;padding:8px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px">'
        +'<select id="new-item-tipo" style="padding:8px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px"><option value="Positivo">Positivo</option><option value="Alerta">Alerta</option></select>'
        +'<button class="btn-primary" id="btn-add-item" style="font-size:12px">+</button>'
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0"><button class="btn-cancel" id="modal-cancel" style="border:none">Cerrar</button></div>'
        +'</div></div>';
      document.getElementById("modal").innerHTML=html;
      document.getElementById("modal-cancel").onclick=function(){ document.getElementById("modal").innerHTML=""; render(); };
      document.getElementById("modal-overlay").onclick=function(e){ if(e.target===this){ document.getElementById("modal").innerHTML=""; render(); } };
      document.getElementById("btn-add-item").onclick=function(){
        var n=document.getElementById("new-item-nombre").value.trim();
        var t=document.getElementById("new-item-tipo").value;
        if(!n) return;
        if(items.find(function(x){ return x.nombre===n; })){ alert("Ya existe ese indicador."); return; }
        items.push({nombre:n,tipo:t});
        guardarItems();
        document.getElementById("modal").innerHTML=""; render();
      };
      document.querySelectorAll("[data-action='del-item']").forEach(function(btn){
        btn.onclick=function(){
          var idx=parseInt(btn.dataset.idx);
          var it=items[idx];
          showModal("Quitar indicador","Quitar el indicador <strong>"+it.nombre+"</strong>?",function(){
            items.splice(idx,1); guardarItems(); render();
          });
        };
      });

      // ── Editar nombre indicador ──
      document.querySelectorAll("[data-action='edit-item']").forEach(function(btn){
        btn.onclick=function(){
          var idx=btn.dataset.idx;
          var row=document.getElementById("item-row-"+idx);
          row.querySelector(".item-nombre-text").style.display="none";
          row.querySelector(".item-nombre-input").style.display="";
          row.querySelector(".item-nombre-input").focus();
          row.querySelector(".btn-edit-item").style.display="none";
          row.querySelector(".btn-del-item").style.display="none";
          row.querySelector(".btn-save-item").style.display="";
          row.querySelector(".btn-cancel-item").style.display="";
        };
      });
      document.querySelectorAll("[data-action='save-item']").forEach(function(btn){
        btn.onclick=function(){
          var idx=parseInt(btn.dataset.idx);
          var row=document.getElementById("item-row-"+idx);
          var nuevoNombre=row.querySelector(".item-nombre-input").value.trim();
          if(!nuevoNombre){ alert("El nombre no puede estar vacío."); return; }
          var existe=items.find(function(x,j){ return j!==idx && x.nombre===nuevoNombre; });
          if(existe){ alert("Ya existe un indicador con ese nombre."); return; }
          // Actualizar también en las observaciones guardadas
          var nombreAnterior=items[idx].nombre;
          items[idx].nombre=nuevoNombre;
          state.obs.forEach(function(o){
            if(o.resp[nombreAnterior]!==undefined){
              o.resp[nuevoNombre]=o.resp[nombreAnterior];
              delete o.resp[nombreAnterior];
            }
          });
          guardarItems(); guardarObs();
          // Actualizar UI sin cerrar el modal
          row.querySelector(".item-nombre-text").textContent=nuevoNombre;
          row.querySelector(".item-nombre-input").value=nuevoNombre;
          row.querySelector(".item-nombre-text").style.display="";
          row.querySelector(".item-nombre-input").style.display="none";
          row.querySelector(".btn-edit-item").style.display="";
          row.querySelector(".btn-del-item").style.display="";
          row.querySelector(".btn-save-item").style.display="none";
          row.querySelector(".btn-cancel-item").style.display="none";
        };
      });
      document.querySelectorAll("[data-action='cancel-item']").forEach(function(btn){
        btn.onclick=function(){
          var idx=btn.dataset.idx;
          var row=document.getElementById("item-row-"+idx);
          row.querySelector(".item-nombre-input").value=items[parseInt(idx)].nombre;
          row.querySelector(".item-nombre-text").style.display="";
          row.querySelector(".item-nombre-input").style.display="none";
          row.querySelector(".btn-edit-item").style.display="";
          row.querySelector(".btn-del-item").style.display="";
          row.querySelector(".btn-save-item").style.display="none";
          row.querySelector(".btn-cancel-item").style.display="none";
        };
      });
    };

    var btnGuardar=document.getElementById("btn-guardar");
    if(btnGuardar) btnGuardar.onclick=function(){
      var alDiv=document.getElementById("alert-reg");
      var inpF=document.getElementById("inp-fecha");
      var fechaVal=(inpF&&inpF.value)?inpF.value:(state.reg.fecha||hoy());
      if(!fechaVal||!state.reg.curso||!state.reg.estudiante){
        alDiv.innerHTML='<div class="alert alert-err">⚠ Completa fecha, curso y estudiante.</div>'; return;
      }
      var faltantes=items.filter(function(it){ return !state.reg.resp[it.nombre]; }).map(function(it){ return it.nombre; });
      var obsText=(document.getElementById("inp-observaciones")||{}).value||state.reg.observaciones||"";
      var asigText=(document.getElementById("inp-asignatura")||{}).value||state.reg.asignatura||"";
      var observText=(document.getElementById("inp-observador")||{}).value||state.reg.observador||"";
      var total=0;
      items.forEach(function(it){ total+=pts(it.tipo,state.reg.resp[it.nombre]); });
      var mp=maxPts(); var pct=mp>0?Math.round(total/mp*100):0;
      state.obs.push({id:Date.now().toString(),fecha:fechaVal,estudiante:state.reg.estudiante,resp:Object.assign({},state.reg.resp),observaciones:obsText,asignatura:asigText,observador:observText,asistencia:state.reg.asistencia||"Presente",puntajeTotal:total,pct:pct});
      guardarObs();
      state.reg.resp={}; state.reg.estudiante=""; state.reg.fecha=""; state.reg.observaciones=""; state.reg.asignatura=""; state.reg.observador=""; state.reg.asistencia="";
      alDiv.innerHTML='<div class="alert alert-ok">✓ Observacion guardada correctamente</div>';
      render();
    };
  }

  // REPORTES
  if(state.tab==="reportes"){
    var repCurso=document.getElementById("rep-curso");
    if(repCurso) repCurso.onchange=function(){ state.rep.curso=this.value; state.rep.estudiante=""; render(); };
    var repEst=document.getElementById("rep-est");
    if(repEst) repEst.onchange=function(){ state.rep.estudiante=this.value; render(); };

    document.querySelectorAll("[data-action='toggle-det']").forEach(function(btn){
      btn.onclick=function(){
        var el=document.getElementById(btn.dataset.target);
        if(el){ var open=el.style.display!=="none"; el.style.display=open?"none":"block"; btn.textContent=(open?"▸":"▾")+" Ver indicadores completos"; }
      };
    });
    document.querySelectorAll("[data-action='editar']").forEach(function(btn){
      btn.onclick=function(){
        var id=btn.dataset.id;
        var obs=state.obs.find(function(o){ return o.id===id; });
        if(obs){ state.rep.editId=id; state.rep.editResp=Object.assign({},obs.resp); state.rep.editFecha=obs.fecha; render(); }
      };
    });
    document.querySelectorAll("[data-action='eliminar']").forEach(function(btn){
      btn.onclick=function(){
        var id=btn.dataset.id;
        var obs=state.obs.find(function(o){ return o.id===id; });
        if(!obs) return;
        showModal("Eliminar observacion","¿Eliminar la observacion de <strong>"+obs.estudiante+"</strong> del "+fmtFecha(obs.fecha)+"?",function(){
          state.obs=state.obs.filter(function(o){ return o.id!==id; }); guardarObs(); render();
        });
      };
    });
    document.querySelectorAll(".edit-opt").forEach(function(btn){
      btn.onclick=function(){ state.rep.editResp[btn.dataset.item]=btn.dataset.op; render(); };
    });
    var btnCancelEdit=document.getElementById("btn-cancel-edit");
    if(btnCancelEdit) btnCancelEdit.onclick=function(){ state.rep.editId=null; render(); };
    var btnSaveEdit=document.getElementById("btn-save-edit");
    if(btnSaveEdit) btnSaveEdit.onclick=function(){
      var alDiv=document.getElementById("alert-edit");
      var newFecha=document.getElementById("edit-fecha").value;
      if(!newFecha){ alDiv.innerHTML='<div class="alert alert-err">⚠ Selecciona una fecha.</div>'; return; }
      var falt=items.filter(function(it){ return !state.rep.editResp[it.nombre]; });
      if(falt.length){ alDiv.innerHTML='<div class="alert alert-err">⚠ Faltan: '+falt.map(function(x){ return x.nombre; }).join(", ")+'</div>'; return; }
      var id=btnSaveEdit.dataset.id;
      var obs=state.obs.find(function(o){ return o.id===id; });
      if(obs){
        var total=0; items.forEach(function(it){ total+=pts(it.tipo,state.rep.editResp[it.nombre]); });
        var mp=maxPts(); var pct=mp>0?Math.round(total/mp*100):0;
        obs.fecha=newFecha; obs.resp=Object.assign({},state.rep.editResp); obs.puntajeTotal=total; obs.pct=pct;
        guardarObs(); state.rep.editId=null; render();
      }
    };
  }

  // DASHBOARD
  if(state.tab==="dashboard"){
    var dashFiltro=document.getElementById("dash-filtro");
    if(dashFiltro) dashFiltro.onchange=function(){ state.dash.filtro=this.value; render(); };
    var btnExp=document.getElementById("btn-exportar");
    if(btnExp) btnExp.onclick=exportarExcel;
  }

  // ESTUDIANTES
  if(state.tab==="estudiantes"){
    var newNombre=document.getElementById("new-nombre");
    if(newNombre) newNombre.oninput=function(){ state.est.newNombre=this.value; };
    var newCurso=document.getElementById("new-curso");
    if(newCurso) newCurso.onchange=function(){ state.est.newCurso=this.value; state.est.newCursoCustom=""; render(); };
    var newCursoCustom=document.getElementById("new-curso-custom");
    if(newCursoCustom) newCursoCustom.oninput=function(){ state.est.newCursoCustom=this.value; };
    var btnAddEst=document.getElementById("btn-add-est");
    if(btnAddEst) btnAddEst.onclick=function(){
      var alDiv=document.getElementById("alert-est");
      var nombre=(document.getElementById("new-nombre").value||"").trim();
      var cursoSel=state.est.newCurso;
      var cursoFinal=cursoSel==="__nuevo__"?(state.est.newCursoCustom||"").trim():cursoSel;
      if(!nombre){ alDiv.innerHTML='<div class="alert alert-err">⚠ Escribe el nombre del estudiante.</div>'; return; }
      if(!cursoFinal){ alDiv.innerHTML='<div class="alert alert-err">⚠ Selecciona o escribe un curso.</div>'; return; }
      if((estudiantes[cursoFinal]||[]).indexOf(nombre)>=0){ alDiv.innerHTML='<div class="alert alert-err">⚠ Ya existe ese estudiante en ese curso.</div>'; return; }
      if(!estudiantes[cursoFinal]) estudiantes[cursoFinal]=[];
      estudiantes[cursoFinal].push(nombre);
      guardarEstudiantes();
      state.est.newNombre=""; state.est.newCurso=""; state.est.newCursoCustom="";
      alDiv.innerHTML='<div class="alert alert-ok">✓ '+nombre+' agregado al curso '+cursoFinal+'</div>';
      render();
    };
    document.querySelectorAll("[data-action='del-est']").forEach(function(btn){
      btn.onclick=function(){
        var nombre=btn.dataset.nombre; var curso=btn.dataset.curso;
        showModal("Eliminar estudiante","¿Eliminar a <strong>"+nombre+"</strong> del curso "+curso+"? Las observaciones se conservaran.",function(){
          estudiantes[curso]=estudiantes[curso].filter(function(n){ return n!==nombre; });
          if(!estudiantes[curso].length) delete estudiantes[curso];
          guardarEstudiantes(); render();
        });
      };
    });
  }

  // FICHAS
  if(state.tab==="fichas"){
    var ficCurso=document.getElementById("fic-curso");
    if(ficCurso) ficCurso.onchange=function(){ state.fichas.curso=this.value; state.fichas.estudiante=""; render(); };
    var ficEst=document.getElementById("fic-est");
    if(ficEst) ficEst.onchange=function(){ state.fichas.estudiante=this.value; render(); };

    var btnAddTutor=document.getElementById("btn-add-tutor");
    if(btnAddTutor) btnAddTutor.onclick=function(){
      saveFicha();
      var est=state.fichas.estudiante;
      if(!fichas[est]) fichas[est]={contacto:"",direccion:"",tutores:[],diagPsico:"",diagMedico:""};
      fichas[est].tutores.push({nombre:"",relacion:"",telefono:""});
      guardarFichas(); render();
      setTimeout(function(){ var inputs=document.querySelectorAll(".tutor-nombre"); if(inputs.length) inputs[inputs.length-1].focus(); },50);
    };

    document.querySelectorAll("[data-action='del-tutor']").forEach(function(btn){
      btn.onclick=function(){
        saveFicha();
        var idx=parseInt(btn.dataset.idx);
        var est=state.fichas.estudiante;
        if(fichas[est]&&fichas[est].tutores) fichas[est].tutores.splice(idx,1);
        guardarFichas(); render();
      };
    });

    var btnSaveFicha=document.getElementById("btn-save-ficha");
    if(btnSaveFicha) btnSaveFicha.onclick=function(){
      saveFicha();
      var alDiv=document.getElementById("alert-ficha");
      alDiv.innerHTML='<div class="alert alert-ok" style="margin:0">✓ Ficha guardada correctamente</div>';
      setTimeout(function(){ alDiv.innerHTML=""; },2500);
    };

    var btnPdf=document.getElementById("btn-pdf");
    if(btnPdf) btnPdf.onclick=function(){
      saveFicha();
      generarPDF(state.fichas.estudiante);
    };
  }
}

// ── INICIO ────────────────────────────────────────────────────────────────────
estudiantes=cargarEstudiantes();
items=cargarItems();
fichas=cargarFichas();
state.obs=cargarObs();
render();

(function(){
  var dark=localStorage.getItem("tema")==="dark";
  function aplicar(){
    document.body.classList.toggle("dark",dark);
    var label=dark?"☀️ Modo día":"🌙 Modo noche";
    var iconOnly=dark?"☀️":"🌙";
    var b1=document.getElementById("btn-tema");
    var b2=document.getElementById("btn-tema-float");
    if(b1){ b1.textContent=label; }
    if(b2){ b2.textContent=iconOnly; }
  }
  function toggle(){
    dark=!dark;
    localStorage.setItem("tema",dark?"dark":"light");
    aplicar();
  }
  aplicar();
  document.getElementById("btn-tema").onclick=toggle;
  document.getElementById("btn-tema-float").onclick=toggle;
  // mostrar botón flotante solo en móvil
  function checkMobile(){
    var f=document.getElementById("btn-tema-float");
    if(f) f.style.display=window.innerWidth<=640?"flex":"none";
  }
  checkMobile();
  window.addEventListener("resize",checkMobile);
})();
